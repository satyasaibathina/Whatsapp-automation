name: Run Logiwhiz Flash Report (Step 4)

on:
  schedule:
    # Runs daily at 8:00 AM IST (which is 2:30 AM UTC)
    - cron: '30 2 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

jobs:
  run-flash:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies for Chromium/Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip libxi6 libgconf-2-4 libnss3 libxss1 libasound2 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libgdk-pixbuf2.0-0 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxtst6 ca-certificates fonts-liberation libappindicator1 libnss3 lsb-release xdg-utils

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps

      - name: Run Step 4 — Logiwhiz Flash Report
        env:
          # Targets the persistent WhatsApp service running on your Oracle VPS
          WA_SERVICE_URL: ${{ secrets.WA_SERVICE_URL }}
          WA_API_KEY: ${{ secrets.WA_API_KEY }}

          # LogiWhiz Credentials
          LOGIWHIZ_USERNAME: ${{ secrets.LOGIWHIZ_USERNAME }}
          LOGIWHIZ_PASSWORD: ${{ secrets.LOGIWHIZ_PASSWORD }}

          # WhatsApp Vendor/Expense Tag Configurations (used by Step 4)
          WA_TAGS_MLL_VENDOR: ${{ secrets.WA_TAGS_MLL_VENDOR }}
          WA_TAGS_WZ_VENDOR: ${{ secrets.WA_TAGS_WZ_VENDOR }}
          WA_TAGS_MLL_EXPENSE: ${{ secrets.WA_TAGS_MLL_EXPENSE }}
          WA_TAGS_WZ_EXPENSE: ${{ secrets.WA_TAGS_WZ_EXPENSE }}
        run: |
          python master_pipeline.py --step4-only
