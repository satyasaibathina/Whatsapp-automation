name: Run Payout and Flash Pipeline

on:
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'


      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps

      - name: Run Master Pipeline
        env:
          # Targets the persistent WhatsApp service running on your Oracle VPS
          WA_SERVICE_URL: ${{ secrets.WA_SERVICE_URL }}
          WA_API_KEY: ${{ secrets.WA_API_KEY }}
          
          # Whizzard Credentials
          WHIZZARD_MOBILE: ${{ secrets.WHIZZARD_MOBILE }}
          WHIZZARD_PASSWORD: ${{ secrets.WHIZZARD_PASSWORD }}
          
          # LogiWhiz Credentials
          LOGIWHIZ_USERNAME: ${{ secrets.LOGIWHIZ_USERNAME }}
          LOGIWHIZ_PASSWORD: ${{ secrets.LOGIWHIZ_PASSWORD }}

          # WhatsApp Group ID & Tagging Configurations
          WA_GROUP_ID: ${{ secrets.WA_GROUP_ID }}
          WA_TAG_PERSON: ${{ secrets.WA_TAG_PERSON }}
          WA_TAG_PERSON_ALT: ${{ secrets.WA_TAG_PERSON_ALT }}
          WA_TAGS_MLL_VENDOR: ${{ secrets.WA_TAGS_MLL_VENDOR }}
          WA_TAGS_WZ_VENDOR: ${{ secrets.WA_TAGS_WZ_VENDOR }}
          WA_TAGS_MLL_EXPENSE: ${{ secrets.WA_TAGS_MLL_EXPENSE }}
          WA_TAGS_WZ_EXPENSE: ${{ secrets.WA_TAGS_WZ_EXPENSE }}
        run: |
          python master_pipeline.py
